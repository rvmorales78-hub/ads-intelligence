services:
  - type: web
    name: ads-intelligence
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run landing.py --server.port=8501 --server.address=0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RENDER
        value: true
