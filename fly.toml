app = "ads-intelligence"

[build]

[env]

[mounts]
  source = "data"
  destination = "/data"

[processes]
  app = "streamlit run landing.py --server.port=8501 --server.address=0.0.0.0"

[[services]]
  internal_port = 8501
  protocol = "tcp"
  processes = ["app"]
  
  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
  
  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true
  
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
  
  [[services.tcp_checks]]
    interval = 10000
    timeout = 2000
    grace_period = "10s"